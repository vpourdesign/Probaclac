# ─── Netlify configuration — Probaclac ───────────────────────────────────────

[build]
  publish = "."          # fichiers servis depuis la racine du repo

# ─── Headers de sécurité ─────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# Cache long sur images et fonts
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/microbiote/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── Redirections par sous-domaine ───────────────────────────────────────────
# PATTERN : ajouter 2 lignes par nouveau sous-domaine (from + to + status 200)
# status 200 = rewrite silencieux (l'URL dans la barre reste propre)

# microbiote.probaclac.ca
[[redirects]]
  from   = "https://microbiote.probaclac.ca/*"
  to     = "/microbiote.html"
  status = 200

# boutique.probaclac.ca
[[redirects]]
  from   = "https://boutique.probaclac.ca/"
  to     = "/panier.html"
  status = 200

[[redirects]]
  from   = "https://boutique.probaclac.ca/:page"
  to     = "/:page"
  status = 200

# ── LANDINGS PAGES ──────────────────────────────────────────────────────────
# vaginosis.probaclac.ca
[[redirects]]
  from   = "https://vaginosis.probaclac.ca/*"
  to     = "/landings/vaginosis/index.html"
  status = 200

# yeast.probaclac.ca
[[redirects]]
  from   = "https://yeast.probaclac.ca/*"
  to     = "/landings/yeast/index.html"
  status = 200

# ── AJOUTER ICI pour chaque nouveau sous-domaine ──────────────────────────
# [[redirects]]
#   from   = "https://[condition].probaclac.ca/*"
#   to     = "/landings/[condition]/index.html"
#   status = 200

# ─── URLs propres (sans .html) ───────────────────────────────────────────────
[[redirects]]
  from   = "/microbiote"
  to     = "/microbiote.html"
  status = 200

[[redirects]]
  from   = "/panier"
  to     = "/panier.html"
  status = 200

[[redirects]]
  from   = "/checkout"
  to     = "/checkout.html"
  status = 200

[[redirects]]
  from   = "/confirmation"
  to     = "/confirmation.html"
  status = 200

[[redirects]]
  from   = "/adultes"
  to     = "/produits/probaclac-adulte.html"
  status = 200

# Fallback 404
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 404
